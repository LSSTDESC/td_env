  - mamba[version='>=2.1.1']
  - astroplan
  - astropy
  - camb
  - celerite
  - cmdstan
  - cmdstanpy
  - coloredlogs
  - compilers
  - cosmosis
  - cosmosis-build-standard-library
  - diffsky
  - dust_extinction
  - emcee
  - f90nml
  - firecrown
  - george
  - gwpy
  - ipdb
  - jax
  - jaxlib
  - lalsuite
  - lenstronomy
  - ligo.skymap
  - ligo.em-bright
  - lsdb
  - lsstdesc-gcr-catalogs
  - mpi4py
  - mpich
  - opencosmo
  - polars
  - pycryptodome
  - pyqt
  - root_base
  - sacc
  - seaborn
  - sncosmo
  - tensorflow-cpu
  - xgboost
